services:
  # Development service for local machine (macOS)
  api-dev:
    build:
      context: ./apps/api
    env_file:
      - ./.env.docker.api.dev
    ports:
      - "8080:8080"
    volumes:
      - /Users/eliasjunior/mnt/homevideo/Cine:/videos:ro
    profiles:
      - dev

  api-prod:
    build:
      context: ./apps/api
    env_file:
      - ./.env.docker.api.prod
    environment:
      - ADMIN_PASSWORD_HASH_FILE=/run/secrets/admin_password_hash
    ports:
      - "8080:8080"
    volumes:
      - /mnt/homevideo-smb:/mnt-host/homevideo-smb:ro
    secrets:
      - admin_password_hash
    profiles:
      - prod

  # Development service for local machine (macOS)
  web-dev:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    env_file:
      - ./.env.docker.web.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api-dev
    profiles:
      - dev

  web-prod:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        REACT_APP_SERVER_HOST: ${REACT_APP_SERVER_HOST:-192.168.68.120}
        REACT_APP_SERVER_PROTOCOL: ${REACT_APP_SERVER_PROTOCOL:-http}
    env_file:
      - ./.env.docker.web.prod
    ports:
      - "3000:80"
    depends_on:
      - api-prod
    profiles:
      - prod

secrets:
  admin_password_hash:
    file: ./secrets/admin_password_hash
